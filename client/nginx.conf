server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Gli asset JS/CSS hanno content-hash nel nome (es. index-abc123.js):
    # possono essere cachati a lungo perché il nome cambia ad ogni build.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # React Router: tutte le route non-file servono index.html.
    # Cache-Control no-store qui (non in location = /index.html) perché il browser
    # chiede "/" e nginx fa try_files internamente — location = /index.html non viene mai matchata.
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # Il routing /api/ e' gestito da Traefik (k3s ingress controller)
    # che instrada direttamente al server tramite KEDA HTTP interceptor.
    # Nessun proxy necessario qui.
}
