server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # index.html non ha content-hash nel nome: il browser deve sempre
    # richiederne una copia fresca per caricare i JS corretti dopo ogni deploy.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Gli asset JS/CSS hanno content-hash nel nome (es. index-abc123.js):
    # possono essere cachati a lungo perché il nome cambia ad ogni build.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # React Router: tutte le route non-file servono index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Il routing /api/ e' gestito da Traefik (k3s ingress controller)
    # che instrada direttamente al server tramite KEDA HTTP interceptor.
    # Nessun proxy necessario qui.
}
