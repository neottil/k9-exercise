server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React Router: tutte le route non-file servono index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Il routing /api/ e' gestito da Traefik (k3s ingress controller)
    # che instrada direttamente al server tramite KEDA HTTP interceptor.
    # Nessun proxy necessario qui.
}
