# ClusterIssuer Let's Encrypt (produzione).
# ${LETSENCRYPT_EMAIL} viene sostituito dalla GitHub Action con envsubst.
# Imposta la GitHub Variable LETSENCRYPT_EMAIL con il tuo indirizzo email.
#
# NOME CONDIVISO: "letsencrypt" perché ClusterIssuer
# è cluster-scoped, non namespaced — stesso account ACME/rate limit per
# qualunque app sul cluster (anche ClubManager, sulla stessa VPS), quindi un
# solo ClusterIssuer condiviso invece di uno per app.
#
# La sfida HTTP-01 usa Traefik come ingress class: cert-manager crea
# temporaneamente un Ingress per /.well-known/acme-challenge/ e lascia
# che Let's Encrypt validi il dominio via HTTP.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ${LETSENCRYPT_EMAIL}
    privateKeySecretRef:
      name: letsencrypt-account-key
    solvers:
      - http01:
          ingress:
            class: traefik
