# ${SERVER_IMAGE}, ${LOGIN_TYPE} vengono sostituiti dalla GitHub Action
# con envsubst prima di ogni kubectl apply.
# LOGIN_TYPE: impostare come GitHub Variable (non secret — non sensibili).
# K9_JWT_SECRET: impostare come GitHub Secret → finisce nel k8s secret "k9-secrets".
# Rollback manuale: kubectl rollout undo deployment/k9-server -n k9
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k9-server
  namespace: k9
spec:
  replicas: 1  # KEDA HTTPScaledObject gestisce il numero effettivo di repliche
  selector:
    matchLabels:
      app: k9-server
  template:
    metadata:
      labels:
        app: k9-server
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: server
          image: ${SERVER_IMAGE}
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            - name: LOGIN_TYPE
              value: "${LOGIN_TYPE}"
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: k9-secrets
                  key: MONGODB_URI
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: k9-secrets
                  key: SESSION_SECRET
            - name: K9_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: k9-secrets
                  key: K9_JWT_SECRET
            - name: NOTIFY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: k9-notify-secret
                  key: NOTIFY_API_KEY
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: k9-notify-secret
                  key: SMTP_PASS
            - name: SMTP_HOST
              value: "${SMTP_HOST}"
            - name: SMTP_PORT
              value: "${SMTP_PORT}"
            - name: SMTP_USER
              value: "${SMTP_USER}"
            - name: NOTIFY_RECIPIENTS
              value: "${NOTIFY_RECIPIENTS}"
            - name: APP_URL
              value: "${APP_URL}"
          resources:
            requests:
              cpu: "250m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
