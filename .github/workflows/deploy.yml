name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Legge la versione da ciascun package.json indipendentemente
      - name: Read versions
        id: versions
        run: |
          echo "server=$(jq -r .version server/package.json)" >> $GITHUB_OUTPUT
          echo "client=$(jq -r .version client/package.json)" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/k9-server:${{ steps.versions.outputs.server }}
            ghcr.io/${{ github.repository_owner }}/k9-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          push: true
          platforms: linux/amd64
          build-args: |
            VITE_ENABLE_WITH_OPERATION_FILTER=${{ vars.VITE_ENABLE_WITH_OPERATION_FILTER }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/k9-client:${{ steps.versions.outputs.client }}
            ghcr.io/${{ github.repository_owner }}/k9-client:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Copia i manifest k8s sul VPS ad ogni deploy
      - name: Copy k8s manifests to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: k8s/
          target: /opt/k9/

      - name: Deploy to k3s
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # --- Namespace (deve esistere prima di tutto il resto) ---
            kubectl apply -f /opt/k9/k8s/namespace.yaml

            # --- Secrets (crea o aggiorna in modo idempotente) ---
            kubectl create secret generic k9-secrets \
              --from-literal=MONGODB_URI="${{ secrets.MONGODB_URI }}" \
              --from-literal=SESSION_SECRET="${{ secrets.SESSION_SECRET }}" \
              --namespace=k9 \
              --dry-run=client -o yaml | kubectl apply -f -

            kubectl create secret docker-registry ghcr-secret \
              --docker-server=ghcr.io \
              --docker-username=${{ github.repository_owner }} \
              --docker-password="${{ secrets.GHCR_PAT }}" \
              --namespace=k9 \
              --dry-run=client -o yaml | kubectl apply -f -

            # --- Variabili sostituite da envsubst nei manifest ---
            # envsubst sostituisce SOLO le variabili elencate,
            # lasciando intatti eventuali altri ${...} nel manifest.
            export DOMAIN="${{ vars.DOMAIN }}"
            export SERVER_IMAGE="ghcr.io/${{ github.repository_owner }}/k9-server:${{ steps.versions.outputs.server }}"
            export CLIENT_IMAGE="ghcr.io/${{ github.repository_owner }}/k9-client:${{ steps.versions.outputs.client }}"
            export AUTH_ENABLED="${{ vars.AUTH_ENABLED }}"

            # --- Risorse statiche (services) ---
            kubectl apply -f /opt/k9/k8s/keda-interceptor-svc.yaml
            kubectl apply -f /opt/k9/k8s/server/service.yaml
            kubectl apply -f /opt/k9/k8s/client/service.yaml

            # --- Risorse con sostituzione dominio ---
            envsubst '${DOMAIN}' < /opt/k9/k8s/ingress.yaml | kubectl apply -f -
            envsubst '${DOMAIN}' < /opt/k9/k8s/server/hso.yaml | kubectl apply -f -

            # --- Deployment con sostituzione immagine e variabili ---
            envsubst '${SERVER_IMAGE} ${AUTH_ENABLED}' < /opt/k9/k8s/server/deployment.yaml | kubectl apply -f -
            envsubst '${CLIENT_IMAGE}' < /opt/k9/k8s/client/deployment.yaml | kubectl apply -f -

            # --- Attendi che il rollout sia completato ---
            kubectl rollout status deployment/k9-server -n k9 --timeout=120s
            kubectl rollout status deployment/k9-client -n k9 --timeout=120s
