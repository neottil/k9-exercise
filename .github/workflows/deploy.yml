name: Build & Deploy to Staging

on:
  push:
    branches: [main]

jobs:
  # ── 1. Analyze ─────────────────────────────────────────────────────────────────
  #
  # Rileva quali aree del repository sono cambiate (client, server, k8s).
  # Gli output vengono usati dai job successivi per decidere cosa buildare/deployare.

  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      has_client: ${{ steps.analyze.outputs.has_client }}
      has_server: ${{ steps.analyze.outputs.has_server }}
      has_k8s:    ${{ steps.analyze.outputs.has_k8s }}
      deploy:     ${{ steps.analyze.outputs.deploy }}
      client_version: ${{ steps.versions.outputs.client_version }}
      server_version: ${{ steps.versions.outputs.server_version }}
      k8s_version: ${{ steps.versions.outputs.k8s_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2   # necessario per git diff HEAD~1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Analyze commit
        id: analyze
        run: |
          COMMIT_MSG=$(git log -1 --format=%s)

          # "force-deploy" nel messaggio di commit forza build+deploy di client e server
          if echo "$COMMIT_MSG" | grep -q 'force-deploy'; then
            echo "::notice::force-deploy rilevato — build e deploy forzati per client e server"
            echo "has_client=true" >> $GITHUB_OUTPUT
            echo "has_server=true" >> $GITHUB_OUTPUT
            echo "deploy=true"     >> $GITHUB_OUTPUT
            echo "→ FORCE-DEPLOY  client=true  server=true  deploy=true"
            exit 0
          fi

          # File modificati (fallback per il primo commit del repo)
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null \
                    || git show --name-only --format='' HEAD)

          HAS_CLIENT=false; HAS_SERVER=false; HAS_K8S=false

          echo "$CHANGED" | grep -qE '^client/' && HAS_CLIENT=true || true
          echo "$CHANGED" | grep -qE '^server/' && HAS_SERVER=true || true
          echo "$CHANGED" | grep -qE '^k8s/'    && HAS_K8S=true    || true

          if $HAS_CLIENT || $HAS_SERVER || $HAS_K8S; then DEPLOY=true; else DEPLOY=false; fi

          if ! $HAS_CLIENT && ! $HAS_SERVER && ! $HAS_K8S; then
            echo "::warning::Nessuna modifica in client/, server/ o k8s/. Saltato."
          fi

          echo "has_client=$HAS_CLIENT" >> $GITHUB_OUTPUT
          echo "has_server=$HAS_SERVER" >> $GITHUB_OUTPUT
          echo "has_k8s=$HAS_K8S"       >> $GITHUB_OUTPUT
          echo "deploy=$DEPLOY"         >> $GITHUB_OUTPUT
          echo "::notice:: modifiche rilevate→ client=$HAS_CLIENT  server=$HAS_SERVER  k8s=$HAS_K8S  deploy=$DEPLOY"

      - name: Create/update git tags
        id: versions
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          HAS_CLIENT="${{ steps.analyze.outputs.has_client }}"
          HAS_SERVER="${{ steps.analyze.outputs.has_server }}"
          HAS_K8S="${{ steps.analyze.outputs.has_k8s }}"

          # Funzione per creare/aggiornare tag
          create_or_update_tag() {
            local component=$1
            local version=$2
            local tag="${component}-${version}"

            if git rev-parse "$tag" >/dev/null 2>&1; then
              echo "::notice::Tag $tag esiste già — spostamento a HEAD"
              git tag -d "$tag"
              git push origin ":refs/tags/$tag" 2>/dev/null || true
            fi

            git tag "$tag"
            git push origin "$tag"
            echo "✓ Tag $tag creato"
          }

          # Crea tag per ogni componente modificato
          if [ "$HAS_SERVER" = "true" ]; then
            SERVER_VERSION=$(node -p "require('./server/package.json').version")
            create_or_update_tag "server" "$SERVER_VERSION"
          fi

          if [ "$HAS_CLIENT" = "true" ]; then
            CLIENT_VERSION=$(node -p "require('./client/package.json').version")
            create_or_update_tag "client" "$CLIENT_VERSION"
          fi

          if [ "$HAS_K8S" = "true" ]; then
            ROOT_VERSION=$(node -p "require('./package.json').version")
            create_or_update_tag "k8s" "$ROOT_VERSION"
          fi

          # Esponi le versioni come output
          echo "client_version=$(node -p "require('./client/package.json').version")" >> $GITHUB_OUTPUT
          echo "server_version=$(node -p "require('./server/package.json').version")" >> $GITHUB_OUTPUT
          echo "k8s_version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

  # ── 2. Build ───────────────────────────────────────────────────────────────────
  #
  # Legge le versioni dai package.json e builda le immagini Docker pushando su GHCR.
  # Le versioni nei package.json vengono gestite manualmente.

  build:
    needs: analyze
    runs-on: ubuntu-latest
    if: needs.analyze.outputs.deploy == 'true'
    environment: staging
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        if: needs.analyze.outputs.deploy == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: needs.analyze.outputs.deploy == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Build and push server image
        if: needs.analyze.outputs.has_server == 'true'
        uses: docker/build-push-action@v7
        env:
          DOCKER_BUILD_SUMMARY: false
        with:
          context: ./server
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/k9-server:${{ needs.analyze.outputs.server_version }}
            ghcr.io/${{ github.repository_owner }}/k9-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push client image
        if: needs.analyze.outputs.has_client == 'true'
        uses: docker/build-push-action@v7
        env:
          DOCKER_BUILD_SUMMARY: false
        with:
          context: ./client
          push: true
          platforms: linux/amd64
          build-args: |
            VITE_ENABLE_WITH_OPERATION_FILTER=${{ vars.ENABLE_WITH_OPERATION_FILTER }}
            VITE_LOGIN_TYPE=${{ vars.LOGIN_TYPE }}
            VITE_LOGIN_SITE_URL=${{ vars.LOGIN_SITE_URL }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/k9-client:${{ needs.analyze.outputs.client_version }}
            ghcr.io/${{ github.repository_owner }}/k9-client:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Deploy staging ──────────────────────────────────────────────────────────
  #
  # Copia i manifest k8s sul VPS di staging e aggiorna il cluster.
  # Usa i secret/variabili dell'environment "staging" di GitHub.

  deploy-staging:
    needs: [analyze, build]
    runs-on: ubuntu-latest
    if: needs.build.result == 'success'
    environment: staging
    steps:
      - uses: actions/checkout@v6

      - name: Write SSH key
        run: |
          echo "${{ secrets.VPS_SSH_KEY }}" > /tmp/vps_key
          chmod 600 /tmp/vps_key

      - name: Copy k8s manifests to VPS
        run: |
          scp -i /tmp/vps_key \
              -r \
              -o StrictHostKeyChecking=no \
              k8s \
              ${{ vars.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/k9/

      - name: Deploy to k3s
        run: |
          ssh -i /tmp/vps_key \
              -o StrictHostKeyChecking=no \
              ${{ vars.VPS_USER }}@${{ secrets.VPS_HOST }} 'bash -s' << 'ENDSSH'
          export KUBECONFIG=/home/deploy/.kube/config
          kubectl apply -f /opt/k9/k8s/namespace.yaml

          kubectl create secret generic k9-secrets \
            --from-literal=MONGODB_URI="${{ secrets.MONGODB_URI }}" \
            --from-literal=SESSION_SECRET="${{ secrets.SESSION_SECRET }}" \
            --from-literal=K9_JWT_SECRET="${{ secrets.K9_JWT_SECRET }}" \
            --namespace=k9 --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic k9-notify-secret \
            --from-literal=API_KEY="${{ secrets.API_KEY }}" \
            --from-literal=SMTP_PASS="${{ secrets.SMTP_PASS }}" \
            --namespace=k9 --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic minio-secret \
            --from-literal=MINIO_ROOT_USER="${{ vars.MINIO_ROOT_USER }}" \
            --from-literal=MINIO_ROOT_PASSWORD="${{ secrets.MINIO_ROOT_PASSWORD }}" \
            --namespace=k9 --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.repository_owner }} \
            --docker-password="${{ secrets.GHCR_PAT }}" \
            --namespace=k9 --dry-run=client -o yaml | kubectl apply -f -

          export DOMAIN="${{ vars.DOMAIN }}"
          export LOGIN_TYPE="${{ vars.LOGIN_TYPE }}"
          export LOGIN_SITE_URL="${{ vars.LOGIN_SITE_URL }}"
          export LETSENCRYPT_EMAIL="${{ vars.LETSENCRYPT_EMAIL }}"
          export SMTP_HOST="${{ vars.SMTP_HOST }}"
          export SMTP_PORT="${{ vars.SMTP_PORT }}"
          export SMTP_USER="${{ vars.SMTP_USER }}"
          export NOTIFY_RECIPIENTS="${{ vars.NOTIFY_RECIPIENTS }}"
          export APP_URL="https://${{ vars.DOMAIN }}"

          kubectl apply -f /opt/k9/k8s/traefik-config.yaml

          if kubectl get crd clusterissuers.cert-manager.io &>/dev/null; then
            kubectl wait --for=condition=available deployment \
              --all --namespace cert-manager --timeout=60s || true
            envsubst '${LETSENCRYPT_EMAIL}' < /opt/k9/k8s/cert-manager/clusterissuer.yaml | kubectl apply -f -
          fi

          kubectl apply -f /opt/k9/k8s/keda-interceptor-svc.yaml
          kubectl apply -f /opt/k9/k8s/server/service.yaml
          kubectl apply -f /opt/k9/k8s/client/service.yaml

          # Storage immagini (minIO) — StatefulSet con volumeClaimTemplates
          kubectl apply -f /opt/k9/k8s/minio/service.yaml
          kubectl apply -f /opt/k9/k8s/minio/statefulset.yaml
          envsubst '${DOMAIN}' < /opt/k9/k8s/ingress.yaml       | kubectl apply -f -
          envsubst '${DOMAIN}' < /opt/k9/k8s/server/hso.yaml    | kubectl apply -f -

          echo "→ Deploy server:${{ needs.analyze.outputs.server_version }}"
          export SERVER_IMAGE="ghcr.io/${{ github.repository_owner }}/k9-server:${{ needs.analyze.outputs.server_version }}"
          envsubst '${SERVER_IMAGE} ${LOGIN_TYPE} ${LOGIN_SITE_URL} ${SMTP_HOST} ${SMTP_PORT} ${SMTP_USER} ${NOTIFY_RECIPIENTS} ${APP_URL}' < /opt/k9/k8s/server/deployment.yaml | kubectl apply -f -
          kubectl rollout restart deployment/k9-server -n k9
          kubectl rollout status deployment/k9-server -n k9 --timeout=120s

          echo "→ Deploy client:${{ needs.analyze.outputs.client_version }}"
          export CLIENT_IMAGE="ghcr.io/${{ github.repository_owner }}/k9-client:${{ needs.analyze.outputs.client_version }}"
          envsubst '${CLIENT_IMAGE}' < /opt/k9/k8s/client/deployment.yaml | kubectl apply -f -
          kubectl rollout restart deployment/k9-client -n k9
          kubectl rollout status deployment/k9-client -n k9 --timeout=120s

          kubectl apply -f /opt/k9/k8s/notify/cronjob.yaml
          kubectl apply -f /opt/k9/k8s/images-gc/cronjob.yaml
          ENDSSH

      - name: Job summary
        if: always()
        run: |
          HAS_CLIENT="${{ needs.analyze.outputs.has_client }}"
          HAS_SERVER="${{ needs.analyze.outputs.has_server }}"
          HAS_K8S="${{ needs.analyze.outputs.has_k8s }}"
          SHORT_SHA="${GITHUB_SHA:0:7}"

          {
            echo "## Build & Deploy Staging — $SHORT_SHA"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Commit** | \`${{ github.event.head_commit.message }}\` |"
            echo "| **Autore** | ${{ github.actor }} |"
            echo ""
            echo "### Immagini Docker"
            echo ""
            if [ "$HAS_SERVER" = "true" ]; then echo "- \`ghcr.io/${{ github.repository_owner }}/k9-server:${{ needs.analyze.outputs.server_version }}\`"; fi
            if [ "$HAS_CLIENT" = "true" ]; then echo "- \`ghcr.io/${{ github.repository_owner }}/k9-client:${{ needs.analyze.outputs.client_version }}\`"; fi
            echo ""
            echo "### Deploy → staging (${{ vars.DOMAIN }})"
            echo ""
            if [ "$HAS_SERVER" = "true" ]; then echo "- server **${{ needs.analyze.outputs.server_version }}** deployato"; fi
            if [ "$HAS_CLIENT" = "true" ]; then echo "- client **${{ needs.analyze.outputs.client_version }}** deployato"; fi
            if [ "$HAS_K8S" = "true" ]; then echo "- k8s manifests **${{ needs.analyze.outputs.k8s_version }}** deployato"; fi
          } >> "$GITHUB_STEP_SUMMARY"
