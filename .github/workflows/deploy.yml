name: Build & Deploy

on:
  push:
    branches: [main]
    tags:
      - 'server-*'
      - 'client-*'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # fetch-tags necessario per leggere i tag git sul commit corrente
          fetch-tags: true

      # Cerca i tag server-x.y.z e client-x.y.z che puntano a questo commit.
      # Se non ce ne sono la Action termina con un warning e salta tutto il resto.
      - name: Detect deploy tags
        id: tags
        run: |
          SERVER_TAG=$(git tag --points-at HEAD | grep '^server-' | head -1)
          CLIENT_TAG=$(git tag --points-at HEAD | grep '^client-' | head -1)

          echo "server_tag=$SERVER_TAG"   >> $GITHUB_OUTPUT
          echo "client_tag=$CLIENT_TAG"   >> $GITHUB_OUTPUT
          echo "server_version=${SERVER_TAG#server-}" >> $GITHUB_OUTPUT
          echo "client_version=${CLIENT_TAG#client-}" >> $GITHUB_OUTPUT

          if [ -z "$SERVER_TAG" ] && [ -z "$CLIENT_TAG" ]; then
            echo "::warning::Nessun tag server-* o client-* trovato su questo commit. Build e deploy saltati."
            echo "deploy=false" >> $GITHUB_OUTPUT
          else
            echo "deploy=true" >> $GITHUB_OUTPUT
            [ -n "$SERVER_TAG" ] && echo "  → server: $SERVER_TAG"
            [ -n "$CLIENT_TAG" ] && echo "  → client: $CLIENT_TAG"
          fi

      - name: Login to GitHub Container Registry
        if: steps.tags.outputs.deploy == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.tags.outputs.deploy == 'true'
        uses: docker/setup-buildx-action@v3

      # ── Server ────────────────────────────────────────────────────────────────

      - name: Build and push server image
        if: steps.tags.outputs.server_tag != ''
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/k9-server:${{ steps.tags.outputs.server_version }}
            ghcr.io/${{ github.repository_owner }}/k9-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Client ────────────────────────────────────────────────────────────────

      - name: Build and push client image
        if: steps.tags.outputs.client_tag != ''
        uses: docker/build-push-action@v6
        with:
          context: ./client
          push: true
          platforms: linux/amd64
          build-args: |
            VITE_ENABLE_WITH_OPERATION_FILTER=${{ vars.VITE_ENABLE_WITH_OPERATION_FILTER }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/k9-client:${{ steps.tags.outputs.client_version }}
            ghcr.io/${{ github.repository_owner }}/k9-client:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Deploy ────────────────────────────────────────────────────────────────

      - name: Copy k8s manifests to VPS
        if: steps.tags.outputs.deploy == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: k8s/
          target: /opt/k9/

      - name: Deploy to k3s
        if: steps.tags.outputs.deploy == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # --- Namespace (deve esistere prima di tutto il resto) ---
            kubectl apply -f /opt/k9/k8s/namespace.yaml

            # --- Secrets (crea o aggiorna in modo idempotente) ---
            kubectl create secret generic k9-secrets \
              --from-literal=MONGODB_URI="${{ secrets.MONGODB_URI }}" \
              --from-literal=SESSION_SECRET="${{ secrets.SESSION_SECRET }}" \
              --namespace=k9 \
              --dry-run=client -o yaml | kubectl apply -f -

            kubectl create secret docker-registry ghcr-secret \
              --docker-server=ghcr.io \
              --docker-username=${{ github.repository_owner }} \
              --docker-password="${{ secrets.GHCR_PAT }}" \
              --namespace=k9 \
              --dry-run=client -o yaml | kubectl apply -f -

            # --- Risorse infrastruttura (sempre aggiornate) ---
            export DOMAIN="${{ vars.DOMAIN }}"
            export AUTH_ENABLED="${{ vars.AUTH_ENABLED }}"

            kubectl apply -f /opt/k9/k8s/keda-interceptor-svc.yaml
            kubectl apply -f /opt/k9/k8s/server/service.yaml
            kubectl apply -f /opt/k9/k8s/client/service.yaml
            envsubst '${DOMAIN}' < /opt/k9/k8s/ingress.yaml       | kubectl apply -f -
            envsubst '${DOMAIN}' < /opt/k9/k8s/server/hso.yaml    | kubectl apply -f -

            # --- Deploy server (solo se il tag server-* è presente) ---
            SERVER_VERSION="${{ steps.tags.outputs.server_version }}"
            if [ -n "$SERVER_VERSION" ]; then
              echo "→ Deploy server:${SERVER_VERSION}"
              export SERVER_IMAGE="ghcr.io/${{ github.repository_owner }}/k9-server:${SERVER_VERSION}"
              envsubst '${SERVER_IMAGE} ${AUTH_ENABLED}' < /opt/k9/k8s/server/deployment.yaml | kubectl apply -f -
              kubectl rollout status deployment/k9-server -n k9 --timeout=120s
            fi

            # --- Deploy client (solo se il tag client-* è presente) ---
            CLIENT_VERSION="${{ steps.tags.outputs.client_version }}"
            if [ -n "$CLIENT_VERSION" ]; then
              echo "→ Deploy client:${CLIENT_VERSION}"
              export CLIENT_IMAGE="ghcr.io/${{ github.repository_owner }}/k9-client:${CLIENT_VERSION}"
              envsubst '${CLIENT_IMAGE}' < /opt/k9/k8s/client/deployment.yaml | kubectl apply -f -
              kubectl rollout status deployment/k9-client -n k9 --timeout=120s
            fi
