name: Promote to Production

on:
  workflow_dispatch:
    inputs:
      server_version:
        description: 'Versione server da promuovere (vuoto = ultima da package.json)'
        required: false
        default: ''
      client_version:
        description: 'Versione client da promuovere (vuoto = ultima da package.json)'
        required: false
        default: ''
      k8s_version:
        description: 'Versione k8s dei manifest da deployare (es. 1.5.1 → tag k8s-1.5.1)'
        required: true

jobs:
  # ── 1. Resolve versions ────────────────────────────────────────────────────────
  #
  # Risolve le versioni di server e client: usa gli input se specificati,
  # altrimenti legge i valori correnti dai package.json.

  resolve-versions:
    runs-on: ubuntu-latest
    outputs:
      server_version: ${{ steps.versions.outputs.server_version }}
      client_version: ${{ steps.versions.outputs.client_version }}
    steps:
      - name: Validate inputs
        run: |
          if [ -z "${{ inputs.k8s_version }}" ]; then
            echo "::error::k8s_version è obbligatorio per il promote in production"
            exit 1
          fi

      - uses: actions/checkout@v6

      - name: Resolve versions
        id: versions
        run: |
          SERVER_VERSION="${{ inputs.server_version }}"
          CLIENT_VERSION="${{ inputs.client_version }}"

          if [ -z "$SERVER_VERSION" ]; then
            SERVER_VERSION=$(node -p "require('./server/package.json').version")
          fi
          if [ -z "$CLIENT_VERSION" ]; then
            CLIENT_VERSION=$(node -p "require('./client/package.json').version")
          fi

          echo "server_version=$SERVER_VERSION" >> $GITHUB_OUTPUT
          echo "client_version=$CLIENT_VERSION" >> $GITHUB_OUTPUT
          echo "→ server=$SERVER_VERSION  client=$CLIENT_VERSION"

  # ── 2. Deploy production ───────────────────────────────────────────────────────
  #
  # Delega il deploy al reusable workflow k8s-deploy.yml.
  # Secret e variabili vengono letti dall'environment "production" nel workflow chiamato.
  # k8s_ref permette di specificare quale versione dei manifest k8s deployare.

  deploy-production:
    needs: resolve-versions
    uses: ./.github/workflows/k8s-deploy.yml
    with:
      server_version: ${{ needs.resolve-versions.outputs.server_version }}
      client_version: ${{ needs.resolve-versions.outputs.client_version }}
      environment: production
      k8s_version: ${{ inputs.k8s_version }}
    secrets: inherit

  # ── 3. Summary ─────────────────────────────────────────────────────────────────

  summary:
    needs: [resolve-versions, deploy-production]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Job summary
        env:
          DEPLOY_RESULT: ${{ needs.deploy-production.result }}
        run: |
          status_icon() {
            case "$1" in
              success)  echo "✅" ;;
              failure)  echo "❌" ;;
              skipped)  echo "⏭️" ;;
              *)        echo "⏳" ;;
            esac
          }

          {
            echo "## Promote to Production"
            echo ""
            echo "| Fase | Stato |"
            echo "|------|-------|"
            echo "| **Deploy** | $(status_icon "$DEPLOY_RESULT") |"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Avviato da** | ${{ github.actor }} |"
            echo "| **k8s version** | \`${{ inputs.k8s_version || 'HEAD (main)' }}\` |"
            echo ""
            echo "### Versioni deployate"
            echo ""
            echo "| Componente | Versione |"
            echo "|---|---|"
            echo "| server | \`${{ needs.resolve-versions.outputs.server_version }}\` |"
            echo "| client | \`${{ needs.resolve-versions.outputs.client_version }}\` |"
            echo "| k8s    | \`${{ inputs.k8s_version || 'HEAD (main)' }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
