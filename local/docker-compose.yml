services:
  mongo:
    container_name: mongo-rs
    image: mongo:8.0
    ports:
      - 27017:27017
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo_rs_data:/data/db
    healthcheck:
      test: >
        mongosh --quiet --eval "
          try { rs.status() }
          catch(e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'localhost:27017'}]}) }
        "
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # minIO locale (S3-compatibile) per lo sviluppo della gestione immagini.
  # Console web: http://localhost:9001 (minioadmin/minioadmin)
  minio:
    container_name: minio
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    ports:
      - 9000:9000   # API S3
      - 9001:9001   # Console web
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: ["server", "/data", "--console-address", ":9001"]
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_rs_data:
  minio_data:
